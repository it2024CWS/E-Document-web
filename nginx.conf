server {
    listen 80 default_server;
    server_name _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Use Docker's embedded DNS (127.0.0.11) and re-resolve upstreams on every
    # request so we don't cache stale container IPs across compose restarts.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml+rss application/xml image/svg+xml;
    gzip_min_length 1024;

    # Allow large uploads (tusd resumable chunks)
    client_max_body_size 100M;

    # ---- Reverse proxy: /api → backend ----
    location /api/ {
        # Variable in proxy_pass forces nginx to use the resolver above,
        # rather than caching the IP at config-load time.
        set $backend_upstream "backend:8080";
        proxy_pass         http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # tus / streaming uploads need disabled buffering + long timeouts
        proxy_request_buffering off;
        proxy_buffering         off;
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
    }

    # ---- Reverse proxy: /storage → MinIO ----
    # Proxies presigned download URLs through nginx so the browser never needs
    # direct access to the internal minio:9000 host. Host header is pinned to
    # minio:9000 so MinIO's presigned-URL signature validation still passes.
    location /storage/ {
        set $minio_upstream "minio:9000";
        proxy_pass       http://$minio_upstream/;
        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering  off;
    }

    # ---- Reverse proxy: /swagger → backend ----
    location /swagger/ {
        set $backend_swagger "backend:8080";
        proxy_pass         http://$backend_swagger;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # ---- SPA fallback ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively (Vite emits content-hashed filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
