server {
    listen 80 default_server;
    server_name _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml+rss application/xml image/svg+xml;
    gzip_min_length 1024;

    # Allow large uploads (tusd resumable chunks)
    client_max_body_size 100M;

    # ---- Reverse proxy: /api → backend ----
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # tus / streaming uploads need disabled buffering + long timeouts
        proxy_request_buffering off;
        proxy_buffering         off;
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
    }

    # ---- Reverse proxy: /swagger → backend ----
    location /swagger/ {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # ---- SPA fallback ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively (Vite emits content-hashed filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
